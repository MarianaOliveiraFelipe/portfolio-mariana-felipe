<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 
    - primary meta tags
  -->
  <title>Mariana | Contato</title>
  <meta name="title" content="Mariana | Contato">
  <meta name="description" content="This is a personal portfolio html template made by codewithsadee">

   <!-- 
    - favicon
  -->
  <link rel="icon" href="./assets/images/favicon.svg" type="image/svg+xml">

  <!-- 
    - google font link
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- 
    - custom css link
  -->
  <link rel="stylesheet" href="./assets/css/require.css">
  <link rel="stylesheet" href="./assets/css/pages/contato.css">

</head>

<body>

  <!-- 
    - #PRELOADER
  -->

  <div class="preloader" data-preloader>
    <div class="preloader-circle"></div>
  </div>

  <div id="header-container"></div>
  <script>
  fetch('./header.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('header-container').innerHTML = html;
    });
  </script>

  <main>
    <article>

      <!-- 
        - #CONTACT
      -->

      <section class="section contact has-bg-image" aria-labelledby="contact-label"
        style="background-image: url('./assets/images/service-bg.png')">
        <div class="container">

          <form action="" class="contact-form">

            <h2 class="headline-sm" id="contact-label">Entre em Contato</h2>

            <p class="contact-text body-md">
              Se você tiver alguma dúvida ou quiser discutir um projeto, não hesite em entrar em contato comigo, será um prazer!

            <div class="wrapper">

              <div>
                <label for="name" class="label">Primeiro nome</label>

                <input type="text" name="name" id="name" placeholder="Nome *" required class="input-field">
              </div>

              <div>
                <label for="email" class="label">Seu Email </label>

                <input type="email" name="email" id="email" placeholder="Email *" required class="input-field">
              </div>

            </div>

            <label for="subject" class="label">Assunto</label>
            <input type="text" name="subject" id="subject" placeholder="Assunto *" class="input-field">

            <label for="message" class="label">Sua mensagem </label>
            <textarea name="message" id="message" placeholder="Sua mensagem *" required class="input-field"></textarea>

            <a href="#" class="btn btn-tertiary">Enviar Mensagem</a>

          </form>

          <div class="contact-content">

            <ul class="contact-list">

              <li class="contact-item">

                <div class="item-icon" style="background-color: hsl(177, 39%, 72%)">
                  <ion-icon name="call" aria-hidden="true"></ion-icon>
                </div>

                <div>
                  <p class="label-lg">Número de Telefone</p>

                  <a href="tel:+011236548096" class="body-lg">(88) 99246-5215</a>
                </div>

              </li>

              <li class="contact-item">

                <div class="item-icon" style="background-color: hsl(41, 99%, 64%)">
                  <ion-icon name="mail" aria-hidden="true"></ion-icon>
                </div>

                <div>
                  <p class="label-lg">Email</p>

                  <a href="tel:info@domainname.com" class="body-lg">marianafelipe2101@gmail.com</a>
                </div>

              </li>

              <li class="contact-item">

  <div class="item-icon" style="background-color: #88AFD1">
    <ion-icon name="logo-linkedin" aria-hidden="true"></ion-icon>
  </div>

  <div>
    <p class="label-lg">LinkedIn</p>

    <a href="https://www.linkedin.com/in/mariana-felipe-dev"
       target="_blank"
       class="body-lg">
      mariana-felipe-dev
    </a>
  </div>

</li>

            </ul>

          </div>

        </div>
      </section>

    </article>
  </main>





  <div id="footer-container"></div>

<script>
fetch('./footer.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('footer-container').innerHTML = html;
  });
</script>


  <!-- 
    - custom js link
  -->
  <script src="./assets/js/script.js"></script>

  <!-- 
    - ionicon
  -->
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

</body>

</html>
